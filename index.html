<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Atlas de lecturas</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B2A3D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Atlas">

<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root{
  --ink:#1B2A3D;
  --ink-deep:#121C2C;
  --parchment:#F4EFE1;
  --parchment-line:#E3D9C2;
  --ink-text:#26324A;
  --muted:#7A7363;
  --muted-light:rgba(244,239,225,.62);
  --terracotta:#C1592A;
  --teal:#2F6F6F;
  --gold:#E0AC52;
  --plum:#9C4F6E;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--ink);
  color:var(--parchment);
  font-family:'Inter',sans-serif;
  font-size:15px;
  line-height:1.45;
}
#app{max-width:1180px;margin:0 auto;padding:28px 22px 60px;}

/* ---------- header ---------- */
.app-header{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:6px;}
.app-header h1{
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:2.1rem;
  letter-spacing:-0.01em;
  margin:0;
  color:var(--parchment);
}
.app-subtitle{
  font-family:'IBM Plex Mono',monospace;
  font-size:.74rem;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--gold);
}

/* ---------- stat cards ---------- */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:22px 0 18px;}
.stat-card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:10px;
  padding:13px 14px;
}
.stat-value{font-family:'IBM Plex Mono',monospace;font-size:1.55rem;color:var(--gold);line-height:1;}
.stat-label{font-size:.66rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted-light);margin-top:5px;}

/* ---------- chart panel ---------- */
.panel-label{
  font-family:'IBM Plex Mono',monospace;
  font-size:.7rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--muted-light);
  margin:26px 2px 8px;
}
.chart-panel{
  background:var(--ink-deep);
  border:1px solid rgba(255,255,255,.06);
  border-radius:14px;
  padding:14px 10px 6px;
  position:relative;
}
.chart-panel svg{width:100%;height:auto;display:block;}
.chart-tooltip{
  position:absolute;
  display:none;
  background:var(--parchment);
  color:var(--ink-text);
  padding:7px 11px;
  border-radius:7px;
  font-size:.74rem;
  line-height:1.4;
  pointer-events:none;
  box-shadow:0 6px 18px rgba(0,0,0,.35);
  transform:translate(-50%,-100%);
  white-space:nowrap;
  z-index:30;
}
.chart-tooltip b{font-family:'Fraunces',serif;font-weight:600;}
.chart-legend{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;padding:8px 4px 4px;font-size:.72rem;color:var(--muted-light);}
.chart-legend span{display:inline-flex;align-items:center;gap:6px;}
.legend-dot{width:9px;height:9px;border-radius:50%;display:inline-block;}

/* ---------- mini charts ---------- */
.mini-charts{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:14px;}
.mini-card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:10px;
  padding:13px 14px;
}
.mini-title{font-family:'IBM Plex Mono',monospace;font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted-light);margin-bottom:9px;}
.bar-row{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:.72rem;}
.bar-label{flex:0 0 64px;color:var(--muted-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;height:7px;border-radius:4px;background:rgba(255,255,255,.08);overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;}
.bar-count{flex:0 0 22px;text-align:right;font-family:'IBM Plex Mono',monospace;color:var(--parchment);}

/* ---------- controls (parchment zone) ---------- */
.controls{
  background:var(--parchment);
  border-radius:14px;
  padding:16px 16px 14px;
  margin-top:26px;
  display:flex;
  flex-wrap:wrap;
  gap:9px;
  align-items:center;
}
.controls input[type=text],
.controls select{
  border:1px solid var(--parchment-line);
  background:#fff;
  border-radius:7px;
  padding:7px 10px;
  font-family:'Inter',sans-serif;
  font-size:.82rem;
  color:var(--ink-text);
}
.controls input[type=text]{flex:1 1 180px;min-width:140px;}
#search-input::placeholder{color:#A39C89;}
.controls .grow-gap{flex:1 1 100%;height:0;}
.view-toggle{display:flex;border:1px solid var(--parchment-line);border-radius:7px;overflow:hidden;}
.view-toggle button{
  border:none;background:#fff;color:var(--ink-text);
  font-family:'Inter',sans-serif;font-size:.8rem;padding:7px 13px;cursor:pointer;
}
.view-toggle button.active{background:var(--terracotta);color:#fff;}
.btn-add{
  background:var(--terracotta);color:#fff;border:none;border-radius:7px;
  padding:8px 14px;font-size:.82rem;font-family:'Inter',sans-serif;font-weight:600;cursor:pointer;
}
.btn-add:hover{filter:brightness(1.08);}
.controls-footer{display:flex;justify-content:space-between;align-items:center;width:100%;margin-top:2px;}
.result-count{font-size:.74rem;color:var(--muted);}
.btn-reset{background:none;border:none;color:var(--muted);font-size:.72rem;text-decoration:underline;cursor:pointer;padding:0;}

/* ---------- table ---------- */
.table-scroll{overflow-x:auto;margin-top:14px;border-radius:12px;}
table{width:100%;border-collapse:collapse;background:var(--parchment);min-width:920px;}
th{
  text-align:left;font-size:.66rem;text-transform:uppercase;letter-spacing:.05em;
  color:var(--muted);padding:10px 9px;border-bottom:1px solid var(--parchment-line);
  font-family:'IBM Plex Mono',monospace;font-weight:500;white-space:nowrap;
}
td{padding:8px 9px;border-bottom:1px solid var(--parchment-line);vertical-align:top;font-size:.82rem;color:var(--ink-text);}
tr:hover td{background:rgba(193,89,42,.05);}
.field-text{outline:none;border-radius:4px;padding:2px 4px;}
.field-text:focus{background:#fff;box-shadow:0 0 0 2px rgba(193,89,42,.35);}
td.title-cell .field-text{font-weight:600;}
td.note-cell .field-text{max-width:190px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
td.note-cell .field-text:focus{max-width:320px;white-space:normal;overflow:visible;position:relative;z-index:6;}
.field-select,.field-number{
  border:1px solid var(--parchment-line);border-radius:5px;background:#fff;color:var(--ink-text);
  font-family:'Inter',sans-serif;font-size:.78rem;padding:4px 5px;width:100%;
}
.field-number{width:62px;}
.status-select.s-pendiente{background:#EFEAE0;color:#7A7363;}
.status-select.s-leyendo{background:#FBEAC9;color:#8a6112;}
.status-select.s-leído{background:#E2EFEC;color:#1f5c5c;}
.btn-delete{
  border:none;background:none;color:#B9573A;font-size:1rem;cursor:pointer;padding:0 4px;line-height:1;
}
.btn-delete:hover{color:#7a2d18;}

/* ---------- cards ---------- */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(252px,1fr));gap:13px;margin-top:14px;}
.book-card{
  background:var(--parchment);border:1px solid var(--parchment-line);border-radius:12px;padding:14px 15px;
}
.book-card .card-title{font-family:'Fraunces',serif;font-weight:600;font-size:1.02rem;color:var(--ink-text);outline:none;border-radius:4px;}
.book-card .card-title:focus{background:#fff;box-shadow:0 0 0 2px rgba(193,89,42,.3);}
.book-card .card-author{font-size:.78rem;color:var(--muted);margin:2px 0 10px;outline:none;border-radius:4px;}
.book-card .card-author:focus{background:#fff;}
.card-meta-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:9px;}
.card-meta-row select,.card-meta-row input{font-size:.72rem;padding:3px 5px;border:1px solid var(--parchment-line);border-radius:5px;background:#fff;color:var(--ink-text);}
.card-note{font-size:.78rem;color:var(--ink-text);margin-top:8px;outline:none;border-radius:4px;min-height:18px;}
.card-note:focus{background:#fff;box-shadow:0 0 0 2px rgba(193,89,42,.3);}
.card-footer{display:flex;justify-content:flex-end;margin-top:8px;}

.empty-state{text-align:center;padding:40px 10px;color:var(--muted);font-size:.86rem;}

/* ---------- footer ---------- */
.footer-note{margin-top:18px;text-align:center;font-size:.7rem;color:rgba(244,239,225,.4);}

@media (max-width:760px){
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .mini-charts{grid-template-columns:1fr 1fr;}
  .controls{flex-direction:column;align-items:stretch;}
  .controls select,.controls input[type=text]{flex:1 1 auto;width:100%;}
}

/* ---------- auth gate ---------- */
#auth-gate{
  display:none;
  min-height:100vh;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:24px;
  gap:18px;
}
#auth-gate h1{font-family:'Fraunces',serif;font-weight:600;font-size:1.8rem;margin:0;color:var(--parchment);}
#auth-gate p{color:var(--muted-light);font-size:.88rem;max-width:320px;margin:0;}
.btn-google{
  display:flex;align-items:center;gap:10px;
  background:var(--parchment);color:var(--ink-text);
  border:none;border-radius:10px;padding:13px 22px;
  font-family:'Inter',sans-serif;font-weight:600;font-size:.92rem;
  cursor:pointer;
}
.btn-google:hover{background:#fff;}
.auth-error{color:var(--terracotta);font-size:.78rem;max-width:320px;}

/* ---------- sync status ---------- */
.sync-row{display:flex;align-items:center;gap:14px;}
.sync-status{
  font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:.04em;
  display:flex;align-items:center;gap:6px;color:var(--muted-light);
}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);}
.sync-status[data-state="guardando"] .sync-dot{background:var(--gold);animation:pulse 1s infinite;}
.sync-status[data-state="guardado"] .sync-dot{background:var(--teal);animation:none;}
.sync-status[data-state="error"] .sync-dot{background:var(--terracotta);animation:none;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.btn-signout{
  background:none;border:none;color:var(--muted-light);
  font-family:'IBM Plex Mono',monospace;font-size:.68rem;text-decoration:underline;
  cursor:pointer;padding:0;
}
</style>
</head>
