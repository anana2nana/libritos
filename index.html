<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Atlas de lecturas</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B2A3D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Atlas">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root{
  --ink:#1B2A3D;
  --ink-deep:#121C2C;
  --parchment:#F4EFE1;
  --parchment-line:#E3D9C2;
  --ink-text:#26324A;
  --muted:#7A7363;
  --muted-light:rgba(244,239,225,.62);
  --terracotta:#C1592A;
  --teal:#2F6F6F;
  --gold:#E0AC52;
  --plum:#9C4F6E;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--ink);
  color:var(--parchment);
  font-family:'Inter',sans-serif;
  font-size:15px;
  line-height:1.45;
}
#app{max-width:1180px;margin:0 auto;padding:28px 22px 60px;}

/* ---------- header ---------- */
.app-header{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:6px;}
.app-header h1{
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:2.1rem;
  letter-spacing:-0.01em;
  margin:0;
  color:var(--parchment);
}
.app-subtitle{
  font-family:'IBM Plex Mono',monospace;
  font-size:.74rem;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--gold);
}

/* ---------- stat cards ---------- */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:22px 0 18px;}
.stat-card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:10px;
  padding:13px 14px;
}
.stat-value{font-family:'IBM Plex Mono',monospace;font-size:1.55rem;color:var(--gold);line-height:1;}
.stat-label{font-size:.66rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted-light);margin-top:5px;}

/* ---------- chart panel ---------- */
.panel-label{
  font-family:'IBM Plex Mono',monospace;
  font-size:.7rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--muted-light);
  margin:26px 2px 8px;
}
.chart-panel{
  background:var(--ink-deep);
  border:1px solid rgba(255,255,255,.06);
  border-radius:14px;
  padding:14px 10px 6px;
  position:relative;
}
.chart-panel svg{width:100%;height:auto;display:block;}
.chart-tooltip{
  position:absolute;
  display:none;
  background:var(--parchment);
  color:var(--ink-text);
  padding:7px 11px;
  border-radius:7px;
  font-size:.74rem;
  line-height:1.4;
  pointer-events:none;
  box-shadow:0 6px 18px rgba(0,0,0,.35);
  transform:translate(-50%,-100%);
  white-space:nowrap;
  z-index:30;
}
.chart-tooltip b{font-family:'Fraunces',serif;font-weight:600;}
.chart-legend{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;padding:8px 4px 4px;font-size:.72rem;color:var(--muted-light);}
.chart-legend span{display:inline-flex;align-items:center;gap:6px;}
.legend-dot{width:9px;height:9px;border-radius:50%;display:inline-block;}

/* ---------- mini charts ---------- */
.mini-charts{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:14px;}
.mini-card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:10px;
  padding:13px 14px;
}
.mini-title{font-family:'IBM Plex Mono',monospace;font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted-light);margin-bottom:9px;}
.bar-row{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:.72rem;}
.bar-label{flex:0 0 64px;color:var(--muted-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;height:7px;border-radius:4px;background:rgba(255,255,255,.08);overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;}
.bar-count{flex:0 0 22px;text-align:right;font-family:'IBM Plex Mono',monospace;color:var(--parchment);}

/* ---------- controls (parchment zone) ---------- */
.controls-primary{
  background:var(--parchment);
  border-radius:14px;
  padding:16px 16px 14px;
  margin-top:26px;
  display:flex;
  flex-wrap:wrap;
  gap:9px;
  align-items:center;
}
.controls-primary input[type=text]{
  border:1px solid var(--parchment-line);
  background:#fff;
  border-radius:7px;
  padding:7px 10px;
  font-family:'Inter',sans-serif;
  font-size:.82rem;
  color:var(--ink-text);
  flex:1 1 180px;min-width:140px;
}
#search-input::placeholder{color:#A39C89;}
.controls-primary .grow-gap{flex:1 1 auto;height:0;}
.btn-filters-toggle{
  border:1px solid var(--parchment-line);background:#fff;color:var(--ink-text);
  border-radius:7px;padding:7px 13px;font-size:.82rem;font-family:'Inter',sans-serif;cursor:pointer;
  display:flex;align-items:center;gap:6px;
}
.btn-filters-toggle:hover{border-color:var(--teal);}
.btn-filters-toggle.has-filters{border-color:var(--terracotta);color:var(--terracotta);}
.filters-badge{font-family:'IBM Plex Mono',monospace;font-size:.68rem;background:var(--terracotta);color:#fff;border-radius:9px;padding:1px 6px;display:none;}
.filters-badge.show{display:inline;}
.filters-panel{
  background:var(--parchment);border-radius:14px;padding:0 16px;margin-top:0;
  display:flex;flex-wrap:wrap;gap:9px;align-items:center;
  max-height:0;overflow:hidden;opacity:0;transition:max-height .18s ease, opacity .15s ease, padding .18s ease, margin .18s ease;
}
.filters-panel.open{max-height:300px;opacity:1;padding:14px 16px;margin-top:6px;overflow:visible;}
.filters-panel select{
  border:1px solid var(--parchment-line);background:#fff;border-radius:7px;padding:7px 10px;
  font-family:'Inter',sans-serif;font-size:.82rem;color:var(--ink-text);
}
.btn-clear-filters{background:none;border:none;color:var(--terracotta);font-size:.76rem;text-decoration:underline;cursor:pointer;padding:0;margin-left:4px;}
.view-toggle{display:flex;border:1px solid var(--parchment-line);border-radius:7px;overflow:hidden;}
.view-toggle button{
  border:none;background:#fff;color:var(--ink-text);
  font-family:'Inter',sans-serif;font-size:.8rem;padding:7px 13px;cursor:pointer;
}
.view-toggle button.active{background:var(--terracotta);color:#fff;}
.btn-add{
  background:var(--terracotta);color:#fff;border:none;border-radius:7px;
  padding:8px 14px;font-size:.82rem;font-family:'Inter',sans-serif;font-weight:600;cursor:pointer;
}
.btn-add:hover{filter:brightness(1.08);}
.controls-footer{display:flex;justify-content:space-between;align-items:center;width:100%;margin-top:8px;}
.result-count{font-size:.74rem;color:var(--muted);}
.btn-reset{background:none;border:none;color:var(--muted);font-size:.72rem;text-decoration:underline;cursor:pointer;padding:0;}

/* ---------- table ---------- */
.table-scroll{overflow-x:auto;margin-top:14px;border-radius:12px;}
table{width:100%;border-collapse:collapse;background:var(--parchment);min-width:920px;}
th{
  text-align:left;font-size:.66rem;text-transform:uppercase;letter-spacing:.05em;
  color:var(--muted);padding:10px 9px;border-bottom:1px solid var(--parchment-line);
  font-family:'IBM Plex Mono',monospace;font-weight:500;white-space:nowrap;
}
td{padding:8px 9px;border-bottom:1px solid var(--parchment-line);vertical-align:top;font-size:.82rem;color:var(--ink-text);}
tr:hover td{background:rgba(193,89,42,.05);}
.field-text{outline:none;border-radius:4px;padding:2px 4px;}
.field-text:focus{background:#fff;box-shadow:0 0 0 2px rgba(193,89,42,.35);}
td.title-cell .field-text{font-weight:600;}
td.note-cell .field-text{max-width:190px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
td.note-cell .field-text:focus{max-width:320px;white-space:normal;overflow:visible;position:relative;z-index:6;}
.field-select,.field-number{
  border:1px solid var(--parchment-line);border-radius:5px;background:#fff;color:var(--ink-text);
  font-family:'Inter',sans-serif;font-size:.78rem;padding:4px 5px;width:100%;
}
.field-number{width:62px;}
.status-select.s-pendiente{background:#EFEAE0;color:#7A7363;}
.status-select.s-leyendo{background:#FBEAC9;color:#8a6112;}
.status-select.s-leído{background:#E2EFEC;color:#1f5c5c;}
.star-rating{display:flex;gap:2px;align-items:center;}
.star{font-size:1.05rem;line-height:1;cursor:pointer;color:#D8D2C2;user-select:none;transition:transform .1s;}
.star.filled{color:var(--gold);}
.star:hover{transform:scale(1.15);}
.continent-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.continent-tab{border:1px solid var(--parchment-line);background:#fff;color:var(--ink-text);border-radius:20px;padding:6px 14px;font-size:.82rem;cursor:pointer;display:flex;align-items:center;gap:6px;}
.continent-tab .tab-count{font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:#9b9384;background:#F1ECE0;border-radius:10px;padding:1px 6px;}
.continent-tab.active{background:var(--teal);color:#fff;border-color:var(--teal);}
.continent-tab.active .tab-count{background:rgba(255,255,255,.25);color:#fff;}
.continent-tab:hover{border-color:var(--teal);}
.country-chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}
.country-chip{border:1px solid var(--parchment-line);background:#FBF8F1;color:var(--ink-text);border-radius:14px;padding:3px 10px;font-size:.74rem;cursor:pointer;display:flex;align-items:center;gap:5px;}
.country-chip .chip-count{font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:#9b9384;}
.country-chip.active{background:var(--terracotta);color:#fff;border-color:var(--terracotta);}
.country-chip.active .chip-count{color:#fff;}
.country-chip:hover{border-color:var(--terracotta);}

.btn-delete{
  border:none;background:none;color:#B9573A;font-size:1rem;cursor:pointer;padding:0 4px;line-height:1;
}
.btn-delete:hover{color:#7a2d18;}

/* ---------- cards ---------- */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(252px,1fr));gap:13px;margin-top:14px;}
.book-card{
  background:var(--parchment);border:1px solid var(--parchment-line);border-radius:12px;padding:14px 15px;
}
.book-card .card-title{font-family:'Fraunces',serif;font-weight:600;font-size:1.02rem;color:var(--ink-text);outline:none;border-radius:4px;}
.book-card .card-title:focus{background:#fff;box-shadow:0 0 0 2px rgba(193,89,42,.3);}
.book-card .card-author{font-size:.78rem;color:var(--muted);margin:2px 0 10px;outline:none;border-radius:4px;}
.book-card .card-author:focus{background:#fff;}
.card-meta-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:9px;}
.card-meta-row select,.card-meta-row input{font-size:.72rem;padding:3px 5px;border:1px solid var(--parchment-line);border-radius:5px;background:#fff;color:var(--ink-text);}
.card-note{font-size:.78rem;color:var(--ink-text);margin-top:8px;outline:none;border-radius:4px;min-height:18px;}
.card-note:focus{background:#fff;box-shadow:0 0 0 2px rgba(193,89,42,.3);}
.card-footer{display:flex;justify-content:flex-end;margin-top:8px;}

.empty-state{text-align:center;padding:40px 10px;color:var(--muted);font-size:.86rem;}

/* ---------- footer ---------- */
.footer-note{margin-top:18px;text-align:center;font-size:.7rem;color:rgba(244,239,225,.4);}

@media (max-width:760px){
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .mini-charts{grid-template-columns:1fr 1fr;}
  .controls-primary{flex-direction:column;align-items:stretch;}
  .controls-primary input[type=text]{width:100%;}
  .filters-panel{flex-direction:column;align-items:stretch;}
  .filters-panel select{width:100%;}
}

/* ---------- auth gate ---------- */
#auth-gate{
  display:none;
  min-height:100vh;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:24px;
  gap:18px;
}
#auth-gate h1{font-family:'Fraunces',serif;font-weight:600;font-size:1.8rem;margin:0;color:var(--parchment);}
#auth-gate p{color:var(--muted-light);font-size:.88rem;max-width:320px;margin:0;}
.btn-google{
  display:flex;align-items:center;gap:10px;
  background:var(--parchment);color:var(--ink-text);
  border:none;border-radius:10px;padding:13px 22px;
  font-family:'Inter',sans-serif;font-weight:600;font-size:.92rem;
  cursor:pointer;
}
.btn-google:hover{background:#fff;}
.auth-error{color:var(--terracotta);font-size:.78rem;max-width:320px;}

/* ---------- sync status ---------- */
.sync-row{display:flex;align-items:center;gap:14px;}
.sync-status{
  font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:.04em;
  display:flex;align-items:center;gap:6px;color:var(--muted-light);
}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);}
.sync-status[data-state="guardando"] .sync-dot{background:var(--gold);animation:pulse 1s infinite;}
.sync-status[data-state="guardado"] .sync-dot{background:var(--teal);animation:none;}
.sync-status[data-state="error"] .sync-dot{background:var(--terracotta);animation:none;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.btn-signout{
  background:none;border:none;color:var(--muted-light);
  font-family:'IBM Plex Mono',monospace;font-size:.68rem;text-decoration:underline;
  cursor:pointer;padding:0;
}
</style>
</head>

<script>
function atlasShowFatal(msg){
  var d = document.getElementById('fatal-error-box');
  if(!d){
    d = document.createElement('div');
    d.id = 'fatal-error-box';
    d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#C1592A;color:#fff;padding:14px;font-family:monospace;font-size:12px;z-index:99999;white-space:pre-wrap;max-height:50vh;overflow:auto;';
    document.body.appendChild(d);
  }
  d.textContent += (d.textContent ? '\n\n' : '') + msg;
}
window.addEventListener('error', function(e){
  atlasShowFatal('Error: ' + e.message + (e.filename ? ' ('+e.filename.split('/').pop()+':'+e.lineno+')' : ''));
});
window.addEventListener('unhandledrejection', function(e){
  var reason = e.reason && e.reason.message ? e.reason.message : e.reason;
  atlasShowFatal('Promesa sin gestionar: ' + reason);
});
setTimeout(function(){
  var gate = document.getElementById('auth-gate');
  var app = document.getElementById('app');
  if(gate && app && getComputedStyle(gate).display === 'none' && getComputedStyle(app).display === 'none'){
    atlasShowFatal('La app no ha terminado de cargar tras 20 segundos. Comprueba tu conexión y recarga la página.');
  }
}, 20000);
</script>
<script type="module">
async function atlasLoadModule(url, timeoutMs){
  let timer;
  const timeout = new Promise((_, reject)=>{
    timer = setTimeout(()=>reject(new Error('TIMEOUT cargando ' + url)), timeoutMs);
  });
  try{
    const mod = await Promise.race([import(/* webpackIgnore: true */ url), timeout]);
    clearTimeout(timer);
    return mod;
  }catch(err){
    clearTimeout(timer);
    atlasShowFatal('No se ha podido cargar Firebase: ' + (err && err.message ? err.message : String(err)));
    throw err;
  }
}

let state = {
  books: [],
  view: 'table',
  filtersPanelOpen: false,
  filters:{search:'',continent:'todas',country:'todas',category:'todas',era:'todas',status:'todas',priority:'todas',difficulty:'todas',length:'todas'},
  sort:'priority-asc'
};

/* ===================== almacenamiento (Firestore) ===================== */
let docRef = null;
let saveTimer = null;

function setSyncStatus(stateName){
  const el = document.getElementById('sync-status');
  if(!el) return;
  el.dataset.state = stateName;
  const labels = {guardando:'guardando…', guardado:'guardado', error:'error al guardar'};
  el.querySelector('.sync-label').textContent = labels[stateName] || '';
}

async function loadBooks(){
  let saved = null;
  try{
    const snap = await getDoc(docRef);
    if(snap.exists()){
      const data = snap.data();
      saved = Array.isArray(data.books) ? data.books : null;
    }
  }catch(e){ console.error('No se pudo leer de Firestore', e); saved = null; }

  if(!saved){
    state.books = seedBooks.map(b=>({...b}));
  }else{
    const savedMap = {};
    saved.forEach(b=>{ savedMap[b.id] = b; });
    const seedIds = new Set(seedBooks.map(b=>b.id));
    // El contenido (título, metadatos, notas...) siempre viene de la versión más reciente del atlas;
    // el estado de lectura de cada libro se conserva desde lo que ya tenías guardado.
    const merged = seedBooks.map(seedBook=>{
      const prev = savedMap[seedBook.id];
      return prev ? {...seedBook, status:prev.status, rating:Number(prev.rating)||0} : {...seedBook, rating:0};
    });
    // Cualquier libro que hayas añadido tú misma con "+ Añadir libro" (no forma parte del atlas curado) se conserva tal cual.
    saved.forEach(b=>{ if(!seedIds.has(b.id)) merged.push(b); });
    state.books = merged;
  }
  try{ await flushSave(); }catch(e){}
}

function saveBooks(){
  clearTimeout(saveTimer);
  setSyncStatus('guardando');
  saveTimer = setTimeout(flushSave, 900);
}

async function flushSave(){
  clearTimeout(saveTimer);
  if(!docRef) return;
  try{
    setSyncStatus('guardando');
    await setDoc(docRef, { books: state.books, updatedAt: Date.now() });
    setSyncStatus('guardado');
  }catch(e){
    console.error('No se pudo guardar en Firestore', e);
    setSyncStatus('error');
  }
}
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='hidden') flushSave(); });
window.addEventListener('pagehide', flushSave);

/* ===================== utilidades ===================== */
function esc(str){
  return String(str==null?'':str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function hashStr(str){let h=0;for(let i=0;i<str.length;i++){h=(h*31+str.charCodeAt(i))>>>0;}return h;}
function lengthBucket(p){ p=Number(p)||0; if(p<250) return 'corta'; if(p<=500) return 'media'; return 'larga'; }
function optionList(values, current, labels){
  return values.map(v=>`<option value="${esc(v)}"${v===current?' selected':''}>${esc(labels&&labels[v]?labels[v]:v)}</option>`).join('');
}

/* ===================== filtros y orden ===================== */
function getFiltered(){
  const f = state.filters;
  let list = state.books.filter(b=>{
    if(f.search){
      const q=f.search.toLowerCase();
      const hay = (b.title+' '+b.author+' '+b.country).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    if(f.continent!=='todas' && b.continent!==f.continent) return false;
    if(f.country!=='todas' && b.country!==f.country) return false;
    if(f.category!=='todas' && b.category!==f.category) return false;
    if(f.era!=='todas' && b.era!==f.era) return false;
    if(f.status!=='todas' && b.status!==f.status) return false;
    if(f.priority!=='todas' && String(b.priority)!==f.priority) return false;
    if(f.difficulty!=='todas' && String(b.difficulty)!==f.difficulty) return false;
    if(f.length!=='todas' && lengthBucket(b.pages)!==f.length) return false;
    return true;
  });
  const s = state.sort;
  list = [...list].sort((a,b)=>{
    switch(s){
      case 'priority-asc': return a.priority-b.priority || a.title.localeCompare(b.title);
      case 'priority-desc': return b.priority-a.priority || a.title.localeCompare(b.title);
      case 'difficulty-asc': return a.difficulty-b.difficulty || a.title.localeCompare(b.title);
      case 'difficulty-desc': return b.difficulty-a.difficulty || a.title.localeCompare(b.title);
      case 'title-asc': return a.title.localeCompare(b.title);
      case 'country-asc': return a.country.localeCompare(b.country);
      case 'pages-asc': return a.pages-b.pages;
      case 'pages-desc': return b.pages-a.pages;
      default: return 0;
    }
  });
  return list;
}

/* ===================== render: stats ===================== */
function renderStats(){
  const books = state.books, total = books.length;
  const leidos = books.filter(b=>b.status==='leído').length;
  const pct = total ? Math.round(leidos/total*100) : 0;
  const countries = new Set(books.map(b=>b.country)).size;
  const totalPages = books.reduce((s,b)=>s+(Number(b.pages)||0),0);
  const avgDiff = total ? (books.reduce((s,b)=>s+Number(b.difficulty),0)/total).toFixed(1) : '0.0';
  document.getElementById('app').querySelector('#stats-row').innerHTML = `
    <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">Libros en total</div></div>
    <div class="stat-card"><div class="stat-value">${pct}%</div><div class="stat-label">Leídos</div></div>
    <div class="stat-card"><div class="stat-value">${countries}</div><div class="stat-label">Países / culturas</div></div>
    <div class="stat-card"><div class="stat-value">${totalPages.toLocaleString('es-ES')}</div><div class="stat-label">Páginas totales</div></div>
    <div class="stat-card"><div class="stat-value">${avgDiff}</div><div class="stat-label">Dificultad media</div></div>
  `;
}

/* ===================== render: carta estelar ===================== */
const PLOT = {x0:74,x1:716,y0:34,y1:240};
function xFor(p){ return PLOT.x0 + (p-1)/4*(PLOT.x1-PLOT.x0); }
function yFor(d){ return PLOT.y1 - (d-1)/4*(PLOT.y1-PLOT.y0); }

function renderChart(){
  const books = state.books;
  const pagesArr = books.map(b=>Number(b.pages)||0);
  const minP = Math.min(...pagesArr), maxP = Math.max(...pagesArr);
  function rFor(p){
    if(maxP===minP) return 6;
    const t = Math.sqrt((p-minP)/(maxP-minP));
    return 4 + 7*t;
  }
  let grid='';
  for(let i=1;i<=5;i++){
    grid += `<line x1="${xFor(i)}" y1="${PLOT.y0}" x2="${xFor(i)}" y2="${PLOT.y1}" stroke="rgba(255,255,255,.07)"/>`;
    grid += `<line x1="${PLOT.x0}" y1="${yFor(i)}" x2="${PLOT.x1}" y2="${yFor(i)}" stroke="rgba(255,255,255,.07)"/>`;
    grid += `<text x="${xFor(i)}" y="${PLOT.y1+16}" font-size="9" fill="rgba(244,239,225,.45)" text-anchor="middle" font-family="IBM Plex Mono">${i}</text>`;
    grid += `<text x="${PLOT.x0-10}" y="${yFor(i)+3}" font-size="9" fill="rgba(244,239,225,.45)" text-anchor="end" font-family="IBM Plex Mono">${i}</text>`;
  }
  let dots='';
  books.forEach(b=>{
    const h = hashStr(b.id+b.title);
    const jx = (h%44)-22;
    const jy = (Math.floor(h/44)%26)-13;
    const cx = Math.min(PLOT.x1+8, Math.max(PLOT.x0-8, xFor(b.priority)+jx));
    const cy = Math.min(PLOT.y1+8, Math.max(PLOT.y0-8, yFor(b.difficulty)+jy));
    const color = CONTINENT_COLOR[b.continent] || '#999';
    dots += `<circle data-id="${esc(b.id)}" cx="${cx}" cy="${cy}" r="${rFor(Number(b.pages)||0).toFixed(1)}" fill="${color}" fill-opacity="${b.status==='leído'?0.95:0.55}" stroke="${b.status==='leído'?color:'rgba(0,0,0,0)'}" stroke-width="1.5" style="cursor:pointer;"/>`;
  });
  const svg = `
  <svg viewBox="0 0 790 268" xmlns="http://www.w3.org/2000/svg">
    ${grid}
    <text x="${(PLOT.x0+PLOT.x1)/2}" y="262" font-size="9.5" letter-spacing="1" fill="rgba(224,172,82,.75)" text-anchor="middle" font-family="IBM Plex Mono">PRIORIDAD — universal → nicho</text>
    <text x="14" y="${(PLOT.y0+PLOT.y1)/2}" font-size="9.5" letter-spacing="1" fill="rgba(224,172,82,.75)" text-anchor="middle" font-family="IBM Plex Mono" transform="rotate(-90 14 ${(PLOT.y0+PLOT.y1)/2})">DIFICULTAD — fácil → difícil</text>
    <text x="${PLOT.x0+6}" y="${PLOT.y1-8}" font-size="9" fill="rgba(244,239,225,.4)" font-style="italic" font-family="Inter">↙ empieza aquí</text>
    <text x="${PLOT.x1-6}" y="${PLOT.y0+13}" font-size="9" fill="rgba(244,239,225,.4)" font-style="italic" text-anchor="end" font-family="Inter">para más adelante ↗</text>
    ${dots}
  </svg>`;
  const panel = document.getElementById('chart-svg-wrap');
  panel.innerHTML = svg;
  const legend = CONTINENTS.map(c=>`<span><span class="legend-dot" style="background:${CONTINENT_COLOR[c]}"></span>${c}</span>`).join('');
  document.getElementById('chart-legend').innerHTML = legend + `<span style="opacity:.6">· tamaño = nº de páginas · relleno sólido = leído</span>`;
}

/* ===================== render: mini gráficos ===================== */
function barPanel(containerId, title, rows, total){
  const html = rows.map(r=>{
    const pct = total ? Math.round(r.count/total*100) : 0;
    return `<div class="bar-row">
      <div class="bar-label" title="${esc(r.label)}">${esc(r.label)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${r.color}"></div></div>
      <div class="bar-count">${r.count}</div>
    </div>`;
  }).join('');
  document.getElementById(containerId).innerHTML = `<div class="mini-title">${title}</div>${html}`;
}
function renderMiniCharts(){
  const books = state.books, total = books.length;

  const statusRows = STATUSES.map(s=>({label:s,count:books.filter(b=>b.status===s).length,color:STATUS_COLOR[s]}));
  barPanel('mini-status','Por estado de lectura', statusRows, total);

  const contRows = CONTINENTS.map(c=>({label:c,count:books.filter(b=>b.continent===c).length,color:CONTINENT_COLOR[c]}));
  barPanel('mini-continent','Por continente / cultura', contRows, total);

  const diffRows = [1,2,3,4,5].map(n=>({label:'Nivel '+n,count:books.filter(b=>Number(b.difficulty)===n).length,color:'#2F6F6F'}));
  barPanel('mini-difficulty','Por dificultad (1–5)', diffRows, total);

  const prioRows = [1,2,3,4,5].map(n=>({label:'Nivel '+n,count:books.filter(b=>Number(b.priority)===n).length,color:'#C1592A'}));
  barPanel('mini-priority','Por prioridad (1=universal)', prioRows, total);
}

/* ===================== render: controles ===================== */
function renderContinentTabs(){
  const counts = {};
  state.books.forEach(b=>{ counts[b.continent] = (counts[b.continent]||0)+1; });
  const total = state.books.length;
  const tabs = [`<button class="continent-tab${state.filters.continent==='todas'?' active':''}" data-continent="todas">Todos <span class="tab-count">${total}</span></button>`]
    .concat(CONTINENTS.map(c=>`<button class="continent-tab${state.filters.continent===c?' active':''}" data-continent="${esc(c)}">${esc(c)} <span class="tab-count">${counts[c]||0}</span></button>`));
  document.getElementById('continent-tabs').innerHTML = tabs.join('');
}

function renderCountryChips(){
  const el = document.getElementById('country-chips');
  if(state.filters.continent==='todas'){ el.innerHTML=''; return; }
  const counts = {};
  state.books.filter(b=>b.continent===state.filters.continent).forEach(b=>{
    const c = b.country || '(sin país)';
    counts[c] = (counts[c]||0)+1;
  });
  const countries = Object.keys(counts).sort((a,b)=>a.localeCompare(b));
  const chips = [`<button class="country-chip${state.filters.country==='todas'?' active':''}" data-country="todas">Todos los países</button>`]
    .concat(countries.map(c=>`<button class="country-chip${state.filters.country===c?' active':''}" data-country="${esc(c)}">${esc(c)} <span class="chip-count">${counts[c]}</span></button>`));
  el.innerHTML = chips.join('');
}

function renderControlsState(){
  renderContinentTabs();
  renderCountryChips();
  document.getElementById('filter-category').value = state.filters.category;
  document.getElementById('filter-era').value = state.filters.era;
  document.getElementById('filter-status').value = state.filters.status;
  document.getElementById('filter-priority').value = state.filters.priority;
  document.getElementById('filter-difficulty').value = state.filters.difficulty;
  document.getElementById('filter-length').value = state.filters.length;
  document.getElementById('sort-select').value = state.sort;
  document.querySelectorAll('.view-toggle button').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.view===state.view);
  });
  document.getElementById('filters-panel').classList.toggle('open', state.filtersPanelOpen);
  const f = state.filters;
  const activeCount = ['category','era','status','priority','difficulty','length'].filter(k=>f[k]!=='todas').length;
  const badge = document.getElementById('filters-badge');
  const toggleBtn = document.getElementById('btn-filters-toggle');
  badge.textContent = activeCount || '';
  badge.classList.toggle('show', activeCount>0);
  toggleBtn.classList.toggle('has-filters', activeCount>0);
}

/* ===================== render: lista (tabla / tarjetas) ===================== */
function priorityOption(b){
  const labels={1:'1 · universal',2:'2',3:'3',4:'4',5:'5 · nicho'};
  return `<select class="field-select" data-id="${b.id}" data-field="priority">${optionList([1,2,3,4,5],b.priority,labels)}</select>`;
}
function difficultyOption(b){
  const labels={1:'1 · fácil',2:'2',3:'3',4:'4',5:'5 · difícil'};
  return `<select class="field-select" data-id="${b.id}" data-field="difficulty">${optionList([1,2,3,4,5],b.difficulty,labels)}</select>`;
}
function continentOption(b){ return `<select class="field-select" data-id="${b.id}" data-field="continent">${optionList(CONTINENTS,b.continent)}</select>`; }
function categoryOption(b){ return `<select class="field-select" data-id="${b.id}" data-field="category">${optionList(CATEGORIES,b.category)}</select>`; }
function eraOption(b){ return `<select class="field-select" data-id="${b.id}" data-field="era">${optionList(ERAS,b.era)}</select>`; }
function statusOption(b){ return `<select class="field-select status-select s-${b.status}" data-id="${b.id}" data-field="status">${optionList(STATUSES,b.status)}</select>`; }
function pagesInput(b){ return `<input type="number" min="1" class="field-number" data-id="${b.id}" data-field="pages" value="${Number(b.pages)||0}">`; }
function starsHtml(b){
  const r = Number(b.rating)||0;
  let out = `<div class="star-rating" data-id="${b.id}">`;
  for(let i=1;i<=5;i++){
    out += `<span class="star${i<=r?' filled':''}" data-id="${b.id}" data-value="${i}">★</span>`;
  }
  out += `</div>`;
  return out;
}

function renderTable(list){
  if(list.length===0) return `<div class="empty-state">No hay libros que coincidan con estos filtros.</div>`;
  const rows = list.map(b=>`
    <tr>
      <td class="title-cell"><div class="field-text" contenteditable="true" data-id="${b.id}" data-field="title">${esc(b.title)}</div></td>
      <td><div class="field-text" contenteditable="true" data-id="${b.id}" data-field="author">${esc(b.author)}</div></td>
      <td><div class="field-text" contenteditable="true" data-id="${b.id}" data-field="country">${esc(b.country)}</div></td>
      <td>${categoryOption(b)}</td>
      <td>${continentOption(b)}</td>
      <td>${eraOption(b)}</td>
      <td>${priorityOption(b)}</td>
      <td>${difficultyOption(b)}</td>
      <td>${pagesInput(b)}</td>
      <td>${statusOption(b)}</td>
      <td>${starsHtml(b)}</td>
      <td class="note-cell"><div class="field-text" contenteditable="true" data-id="${b.id}" data-field="note">${esc(b.note)}</div></td>
      <td><button class="btn-delete" data-id="${b.id}" title="Eliminar">×</button></td>
    </tr>`).join('');
  return `<div class="table-scroll"><table>
    <thead><tr>
      <th>Título</th><th>Autor</th><th>País</th><th>Categoría</th><th>Continente</th><th>Época</th>
      <th>Prioridad</th><th>Dificultad</th><th>Páginas</th><th>Estado</th><th>Valoración</th><th>Nota</th><th></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function renderCards(list){
  if(list.length===0) return `<div class="empty-state">No hay libros que coincidan con estos filtros.</div>`;
  const cards = list.map(b=>`
    <div class="book-card">
      <div class="card-title" contenteditable="true" data-id="${b.id}" data-field="title">${esc(b.title)}</div>
      <div class="card-author" contenteditable="true" data-id="${b.id}" data-field="author">${esc(b.author)} — <span contenteditable="true" data-id="${b.id}" data-field="country" style="display:inline">${esc(b.country)}</span></div>
      <div class="card-meta-row">${categoryOption(b)}${continentOption(b)}${eraOption(b)}</div>
      <div class="card-meta-row">${priorityOption(b)}${difficultyOption(b)}${pagesInput(b)}${statusOption(b)}</div>
      <div class="card-meta-row">${starsHtml(b)}</div>
      <div class="card-note" contenteditable="true" data-id="${b.id}" data-field="note">${esc(b.note)}</div>
      <div class="card-footer"><button class="btn-delete" data-id="${b.id}" title="Eliminar">× eliminar</button></div>
    </div>`).join('');
  return `<div class="cards-grid">${cards}</div>`;
}

function renderList(){
  const list = getFiltered();
  document.getElementById('result-count').textContent = `${list.length} de ${state.books.length} libros`;
  const html = state.view==='table' ? renderTable(list) : renderCards(list);
  document.getElementById('list-container').innerHTML = html;
}

/* ===================== mutaciones ===================== */
function updateBook(id, field, value){
  const b = state.books.find(x=>x.id===id);
  if(!b) return;
  b[field]=value;
  saveBooks();
  renderStats(); renderChart(); renderMiniCharts();
}
function addBook(){
  const id = 'b'+Date.now();
  state.books.unshift({id,title:'Nuevo libro',author:'',country:'',continent:'Europa',era:'Contemporánea',category:'Novela',priority:3,difficulty:3,pages:300,status:'pendiente',rating:0,note:''});
  saveBooks();
  state.filters = {search:'',continent:'todas',country:'todas',category:'todas',era:'todas',status:'todas',priority:'todas',difficulty:'todas',length:'todas'};
  document.getElementById('search-input').value='';
  renderControlsState();
  renderAll();
  const el = document.querySelector(`.field-text[data-id="${id}"][data-field="title"]`);
  if(el){ el.focus(); document.execCommand && window.getSelection().selectAllChildren(el); }
}
function deleteBook(id){
  const b = state.books.find(x=>x.id===id);
  if(!b) return;
  if(!confirm(`¿Eliminar «${b.title}» de tu atlas?`)) return;
  state.books = state.books.filter(x=>x.id!==id);
  saveBooks();
  renderAll();
}
function resetLibrary(){
  if(!confirm(`Esto sustituye tu lista actual por los ${seedBooks.length} libros curados originales (perderás los que hayas añadido tú misma). ¿Continuar?`)) return;
  state.books = seedBooks.map(b=>({...b}));
  saveBooks();
  renderAll();
}

/* ===================== tooltip carta estelar ===================== */
let tooltipEl;
function setupTooltip(){
  const panel = document.getElementById('chart-panel');
  tooltipEl = document.getElementById('chart-tooltip');
  panel.addEventListener('mouseover', e=>{
    if(e.target.tagName!=='circle') return;
    const id = e.target.getAttribute('data-id');
    const b = state.books.find(x=>x.id===id);
    if(!b) return;
    const rect = panel.getBoundingClientRect();
    tooltipEl.style.left = (e.clientX-rect.left)+'px';
    tooltipEl.style.top = (e.clientY-rect.top-6)+'px';
    tooltipEl.innerHTML = `<b>${esc(b.title)}</b><br>${esc(b.author)} — ${esc(b.country)}<br>Prioridad ${b.priority} · Dificultad ${b.difficulty} · ${b.pages}p · ${esc(b.status)}`;
    tooltipEl.style.display='block';
  });
  panel.addEventListener('mousemove', e=>{
    if(tooltipEl.style.display!=='block') return;
    const rect = panel.getBoundingClientRect();
    tooltipEl.style.left = (e.clientX-rect.left)+'px';
    tooltipEl.style.top = (e.clientY-rect.top-6)+'px';
  });
  panel.addEventListener('mouseout', e=>{
    if(e.target.tagName==='circle') tooltipEl.style.display='none';
  });
}

/* ===================== eventos delegados ===================== */
function setupEvents(){
  const app = document.getElementById('app');

  app.addEventListener('click', e=>{
    const del = e.target.closest('.btn-delete');
    if(del){ deleteBook(del.dataset.id); return; }
    const addBtn = e.target.closest('.btn-add');
    if(addBtn){ addBook(); return; }
    const signoutBtn = e.target.closest('#btn-signout');
    if(signoutBtn){ flushSave().finally(()=>signOut(auth)); return; }
    const resetBtn = e.target.closest('.btn-reset');
    if(resetBtn){ resetLibrary(); return; }
    const viewBtn = e.target.closest('.view-toggle button');
    if(viewBtn){ state.view = viewBtn.dataset.view; renderControlsState(); renderList(); return; }
    const filtersToggle = e.target.closest('#btn-filters-toggle');
    if(filtersToggle){ state.filtersPanelOpen = !state.filtersPanelOpen; renderControlsState(); return; }
    const clearFilters = e.target.closest('#btn-clear-filters');
    if(clearFilters){
      state.filters.category='todas'; state.filters.era='todas'; state.filters.status='todas';
      state.filters.priority='todas'; state.filters.difficulty='todas'; state.filters.length='todas';
      renderControlsState();
      renderList();
      return;
    }
    const contTab = e.target.closest('.continent-tab');
    if(contTab){
      state.filters.continent = contTab.dataset.continent;
      state.filters.country = 'todas';
      renderControlsState();
      renderList();
      return;
    }
    const countryChip = e.target.closest('.country-chip');
    if(countryChip){
      state.filters.country = countryChip.dataset.country;
      renderControlsState();
      renderList();
      return;
    }
    const star = e.target.closest('.star');
    if(star){
      const id = star.dataset.id;
      const value = Number(star.dataset.value);
      const b = state.books.find(x=>x.id===id);
      const newVal = (b && Number(b.rating)===value) ? 0 : value;
      updateBook(id, 'rating', newVal);
      renderList();
      return;
    }
  });

  app.addEventListener('change', e=>{
    const t = e.target;
    if(t.classList.contains('field-select') || t.classList.contains('field-number')){
      const id=t.dataset.id, field=t.dataset.field;
      let val = t.value;
      if(['priority','difficulty','pages'].includes(field)) val = Number(val);
      if(field==='status'){ t.className = 'field-select status-select s-'+val; }
      updateBook(id, field, val);
      return;
    }
    if(t.dataset.filter){
      state.filters[t.dataset.filter] = t.value;
      renderList();
      return;
    }
    if(t.id==='sort-select'){ state.sort = t.value; renderList(); return; }
  });

  app.addEventListener('input', e=>{
    if(e.target.id==='search-input'){
      state.filters.search = e.target.value;
      renderList();
    }
  });

  app.addEventListener('focusout', e=>{
    const t = e.target;
    if(t.matches('[contenteditable="true"]') && t.dataset.id && t.dataset.field){
      updateBook(t.dataset.id, t.dataset.field, t.textContent.trim());
    }
  });
}

    <div class="controls-primary">
      <input type="text" id="search-input" placeholder="Buscar título, autor o país…">
      <button class="btn-filters-toggle" id="btn-filters-toggle">Filtros <span class="filters-badge" id="filters-badge"></span></button>
      <div class="grow-gap"></div>
      <div class="view-toggle">
        <button data-view="table" class="active">Tabla</button>
        <button data-view="cards">Tarjetas</button>
      </div>
      <button class="btn-add">+ Añadir libro</button>
    </div>

    <div class="filters-panel" id="filters-panel">
      <select id="filter-category" data-filter="category"><option value="todas">Todas las categorías</option>${optionList(CATEGORIES,'todas')}</select>
      <select id="filter-era" data-filter="era"><option value="todas">Todas las épocas</option>${optionList(ERAS,'todas')}</select>
      <select id="filter-status" data-filter="status"><option value="todas">Cualquier estado</option>${optionList(STATUSES,'todas')}</select>
      <select id="filter-priority" data-filter="priority">
        <option value="todas">Cualquier prioridad</option>
        ${[1,2,3,4,5].map(n=>`<option value="${n}">Prioridad ${n}</option>`).join('')}
      </select>
      <select id="filter-difficulty" data-filter="difficulty">
        <option value="todas">Cualquier dificultad</option>
        ${[1,2,3,4,5].map(n=>`<option value="${n}">Dificultad ${n}</option>`).join('')}
      </select>
      <select id="filter-length" data-filter="length">
        <option value="todas">Cualquier extensión</option>
        <option value="corta">Corta (&lt;250p)</option>
        <option value="media">Media (250–500p)</option>
        <option value="larga">Larga (&gt;500p)</option>
      </select>
      <select id="sort-select">
        <option value="priority-asc">Ordenar: prioridad — universal primero</option>
        <option value="priority-desc">Ordenar: prioridad — nicho primero</option>
        <option value="difficulty-asc">Ordenar: dificultad — fácil primero</option>
        <option value="difficulty-desc">Ordenar: dificultad — difícil primero</option>
        <option value="title-asc">Ordenar: título A–Z</option>
        <option value="country-asc">Ordenar: país A–Z</option>
        <option value="pages-asc">Ordenar: páginas — menos primero</option>
        <option value="pages-desc">Ordenar: páginas — más primero</option>
      </select>
      <button class="btn-clear-filters" id="btn-clear-filters">Limpiar filtros</button>
    </div>

    <div class="controls-footer">
      <span class="result-count" id="result-count"></span>
      <button class="btn-reset" id="btn-reset-label">Restablecer los libros originales</button>
    </div>

    <div id="list-container"></div>

    <div class="footer-note">Tus cambios se guardan automáticamente y siguen aquí la próxima vez que abras este atlas.</div>
  `;
}

/* ===================== render total ===================== */
function renderAll(){
  document.getElementById('header-subtitle').textContent = `${state.books.length} libros · ${new Set(state.books.map(b=>b.continent)).size} continentes · editable`;
  renderStats();
  renderChart();
  renderMiniCharts();
  renderControlsState();
  renderList();
}

/* ===================== init ===================== */
async function initApp(uid){
  docRef = doc(db, 'users', uid, 'atlas', 'lecturas');
  await loadBooks();
  buildShell();
  setupEvents();
  setupTooltip();
  renderAll();
}

function showApp(){
  document.getElementById('auth-gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}
function showGate(){
  document.getElementById('auth-gate').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

document.getElementById('google-login-btn').addEventListener('click', ()=>{
  const el = document.getElementById('auth-error');
  if(el) el.textContent = 'Abriendo ventana de Google…';
  signInWithPopup(auth, googleProvider).then(result=>{
    if(el) el.textContent = '';
  }).catch(err=>{
    if(el) el.textContent = 'Error: '+err.code+' — '+err.message;
  });
});

onAuthStateChanged(auth, user=>{
  if(user){ showApp(); initApp(user.uid); }
  else{ showGate(); }
});

})();
</script>
</body>
</html>
